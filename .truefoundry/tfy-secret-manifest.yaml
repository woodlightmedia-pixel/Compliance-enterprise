version: v1
kind: SecretManifest
metadata:
  name: compliance-agent-secrets
  namespace: main-compliance-space # Must match the workspace name in deploy_prod.py

# This section declares the secret keys that will be encrypted and stored in TrueFoundry/AWS
spec:
  secrets:
    - name: prod-llm-credentials
      type: kv # Key-Value store
      description: "Production API credentials for Google Gemini LLM access"
      keys:
        - GEMINI_API_KEY

    - name: prod-email-credentials
      type: kv
      description: "Secure SMTP relay parameters for transactional automated HR dispatch"
      keys:
        - SMTP_PASSWORD